services:
  nextjs_app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db # SQLite dosyasini hostta kalici tutar
    restart: always
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_SECRET=${NEXTAUTH_SECRET}
      - PORT=3000
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}

  ws_server:
    build: .
    command: ["sh", "-c", "npx prisma generate --schema=/app/prisma/schema.prisma && npm run start:ws"]
    ports:
      - "3001:3001"
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db # SQLite dosyasini hostta kalici tutar
    restart: always
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - AUTH_SECRET=${NEXTAUTH_SECRET}
      - WS_PORT=3001
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}