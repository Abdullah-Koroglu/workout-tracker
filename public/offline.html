<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fit Coach - Offline</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f0fdf4, #dcfce7);
      color: #064e3b;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border: 1px solid #bbf7d0;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.12);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 14px;
      color: #065f46;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    a, button {
      appearance: none;
      border: 0;
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 14px;
    }
    .primary {
      background: #059669;
      color: #ffffff;
    }
    .secondary {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Su an offline moddasin</h1>
    <p>Internet baglantisi geri gelene kadar daha once gezdigin sayfalari gorebilirsin.</p>
    <div class="actions">
      <button class="primary" onclick="location.reload()">Tekrar Dene</button>
      <a id="resumeLink" class="secondary" href="/">Son Kaldigin Sayfaya Don</a>
    </div>
  </div>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("fitcoach-last-route");
        if (saved && saved.startsWith("/") && !saved.startsWith("/api")) {
          document.getElementById("resumeLink").setAttribute("href", saved);
        }
      } catch (e) {
        // no-op
      }
    })();
  </script>
</body>
</html>
