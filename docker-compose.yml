services:
  nextjs_app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db # SQLite dosyasini hostta kalici tutar
    restart: always
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=https://fitcoach.akoroglu.com.tr
      - AUTH_SECRET=uydurma_bir_sey_yaz_buraya
      - PORT=3000
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001/ws

  ws_server:
    build: .
    command: ["sh", "-c", "npx prisma generate --schema=/app/prisma/schema.prisma && npm run start:ws"]
    ports:
      - "3001:3001"
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db # SQLite dosyasini hostta kalici tutar
    restart: always
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - AUTH_SECRET=uydurma_bir_sey_yaz_buraya
      - WS_PORT=3001