<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Precision - Active Workout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&amp;family=Manrope:wght@400;500;600;700&amp;family=Inter:wght@400;600;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#F97316", // High-energy Orange
                    "on-primary": "#ffffff",
                    "primary-container": "#fff7ed",
                    "on-primary-container": "#7c2d12",
                    "secondary": "#0F172A", // Navy
                    "on-secondary": "#ffffff",
                    "secondary-container": "#1E293B",
                    "on-secondary-container": "#F8FAFC",
                    "tertiary": "#0F172A", // Navy for structural hierarchy
                    "surface": "#F8FAFC",
                    "surface-container-low": "#F1F5F9",
                    "surface-container-high": "#E2E8F0",
                    "surface-container-highest": "#CBD5E1",
                    "on-surface": "#0F172A",
                    "on-surface-variant": "#475569",
                    "outline": "#94A3B8",
                    "outline-variant": "#E2E8F0"
            },
            "borderRadius": {
                    "DEFAULT": "0rem", // ROUND_FOUR = 0px/sharp based on elite performance lab style or minimal roundness
                    "lg": "0rem",
                    "xl": "0.125rem",
                    "full": "0.25rem"
            },
            "fontFamily": {
                    "headline": ["Lexend"],
                    "body": ["Manrope"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-glow {
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.15);
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface select-none">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full max-w-full border-b border-outline-variant/30">
<div class="flex items-center gap-3">
<span class="text-lg font-black text-secondary font-headline tracking-tight">Kinetic</span>
<div class="flex items-center gap-1.5 px-2 py-0.5 bg-primary/10 rounded-sm">
<span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings: 'FILL' 1;">visibility</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-primary">Wake Lock Active</span>
</div>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-secondary" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-secondary" data-icon="settings">settings</span>
</div>
</header>
<main class="pt-20 pb-40 px-4 space-y-6">
<!-- Exercise Hero -->
<section class="relative">
<div class="flex flex-col gap-1 mb-4">
<span class="font-label text-[10px] font-black uppercase tracking-[0.25em] text-primary">Exercise 03 of 08</span>
<h1 class="font-headline text-4xl font-black text-secondary leading-[0.9] tracking-tighter uppercase">Bulgarian<br/>Split Squat</h1>
</div>
<div class="relative w-full aspect-video rounded-sm overflow-hidden bg-surface-container-high border-2 border-secondary">
<img class="w-full h-full object-cover grayscale-[0.2] hover:grayscale-0 transition-all duration-500" data-alt="Athletic man performing a Bulgarian split squat" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkwgATxHg1VmmWfR3fEBT3cpAK6PVsoKP8qDLKil7BjlOalPLhnajqOuKgMHvOvEUXcOiAbAzBWJ9HgjP7FJ5iFWlm9XpbAeIt-zduh2s0tfuPBiTZbP75cplGht7875U07jtGXEtCp_LarjF_-9mBx7Cx7SR8f07jyHH16qlpFtdSXv2yvp3nNr-lHPRB1mklrGImnxY5pyMcC84D7MFnTwF7e1vEhgc-9NQtIytySva080qofl1PDKk_2Auu7vwNRobPt7pI-QE"/>
<div class="absolute bottom-4 right-4 flex gap-2">
<button class="w-10 h-10 rounded-sm bg-secondary/80 backdrop-blur-md flex items-center justify-center text-white border border-white/20">
<span class="material-symbols-outlined text-[20px]">fullscreen</span>
</button>
<button class="w-10 h-10 rounded-sm bg-primary flex items-center justify-center text-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
</div>
</section>
<!-- Tracker Section -->
<section class="bg-white border-2 border-secondary/5 rounded-sm p-4 space-y-4">
<div class="flex justify-between items-end px-1">
<div class="flex flex-col">
<span class="font-label text-[10px] font-black text-outline uppercase tracking-widest">Active Timer</span>
<span class="font-headline text-3xl font-black text-secondary">01:42</span>
</div>
<div class="flex gap-2">
<button class="bg-secondary px-4 py-2 rounded-sm font-label text-[11px] font-black uppercase tracking-widest text-white">+ Add Set</button>
</div>
</div>
<!-- Set Tracker Table -->
<div class="space-y-1.5">
<!-- Header -->
<div class="grid grid-cols-5 px-3 py-2 font-label text-[10px] font-black uppercase tracking-[0.2em] text-outline border-b border-outline-variant/30">
<div class="col-span-1">Set</div>
<div class="col-span-1">Lbs</div>
<div class="col-span-1">Reps</div>
<div class="col-span-1">RIR</div>
<div class="col-span-1 text-right">Done</div>
</div>
<!-- Row 1 (Completed) -->
<div class="grid grid-cols-5 items-center px-3 py-4 bg-surface-container-low rounded-sm">
<div class="col-span-1 font-headline font-bold text-secondary">1</div>
<div class="col-span-1 font-label font-bold text-secondary">45</div>
<div class="col-span-1 font-label font-bold text-secondary">10</div>
<div class="col-span-1 font-label font-bold text-secondary">2</div>
<div class="col-span-1 flex justify-end">
<div class="w-7 h-7 rounded-sm bg-secondary flex items-center justify-center text-white">
<span class="material-symbols-outlined text-[18px]">check</span>
</div>
</div>
</div>
<!-- Row 2 (Active) -->
<div class="grid grid-cols-5 items-center px-3 py-4 bg-white border-2 border-primary active-glow rounded-sm">
<div class="col-span-1 font-headline font-black text-primary text-xl">2</div>
<div class="col-span-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-label font-black text-secondary text-lg" type="number" value="45"/>
</div>
<div class="col-span-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-label font-black text-secondary text-lg" placeholder="--" type="number"/>
</div>
<div class="col-span-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-label font-black text-secondary text-lg" placeholder="--" type="number"/>
</div>
<div class="col-span-1 flex justify-end">
<button class="w-7 h-7 rounded-sm border-2 border-primary bg-primary/5"></button>
</div>
</div>
<!-- Row 3 (Upcoming) -->
<div class="grid grid-cols-5 items-center px-3 py-4 bg-surface-container-low/50 rounded-sm opacity-50">
<div class="col-span-1 font-headline font-bold text-outline">3</div>
<div class="col-span-1 font-label font-semibold text-outline">45</div>
<div class="col-span-1 font-label font-semibold text-outline">10</div>
<div class="col-span-1 font-label font-semibold text-outline">2</div>
<div class="col-span-1 flex justify-end">
<div class="w-7 h-7 rounded-sm border-2 border-outline/30"></div>
</div>
</div>
</div>
</section>
<!-- Metric Bento Small -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-secondary p-5 rounded-sm flex flex-col justify-between h-28 border-l-4 border-primary">
<span class="font-label text-[10px] font-black uppercase tracking-widest text-primary/80">Total Volume</span>
<span class="font-headline text-2xl font-black text-white tracking-tighter uppercase">1,350 lbs</span>
</div>
<div class="bg-white border-2 border-secondary/10 p-5 rounded-sm flex flex-col justify-between h-28">
<span class="font-label text-[10px] font-black uppercase tracking-widest text-outline">Target RPE</span>
<span class="font-headline text-2xl font-black text-secondary tracking-tighter uppercase">8.5</span>
</div>
</div>
</main>
<!-- Bottom Navigation Shell & Actions -->
<div class="fixed bottom-0 left-0 w-full z-50">
<!-- Floating Primary Action -->
<div class="px-4 pb-6">
<button class="w-full py-5 bg-primary rounded-sm font-headline font-black uppercase tracking-widest text-white shadow-[0_12px_24px_rgba(249,115,22,0.3)] active:translate-y-1 transition-all border-b-4 border-primary-container/20">
                Complete Set &amp; Start Rest
            </button>
</div>
<!-- BottomNavBar -->
<nav class="bg-secondary flex justify-around items-center px-4 py-3 pb-8 shadow-[0_-8px_30px_rgb(0,0,0,0.2)]">
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[22px]" data-icon="home">home</span>
<span class="font-label text-[9px] font-bold uppercase tracking-[0.2em] mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center bg-primary text-white rounded-sm w-12 h-12 mb-2 shadow-lg">
<span class="material-symbols-outlined text-[24px]" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[22px]" data-icon="chat_bubble">chat_bubble</span>
<span class="font-label text-[9px] font-bold uppercase tracking-[0.2em] mt-1">Chat</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[22px]" data-icon="person">person</span>
<span class="font-label text-[9px] font-bold uppercase tracking-[0.2em] mt-1">Profile</span>
</div>
</nav>
</div>
</body></html>
