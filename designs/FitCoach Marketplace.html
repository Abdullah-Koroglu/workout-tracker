// ── Marketplace Page ───────────────────────────────────────
function MarketplacePage({ onViewCoach }) {
  const [activeFilter, setActiveFilter] = useState('Tümü');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('En Yüksek Puan');
  const [city, setCity] = useState('Tüm Şehirler');
  const [layout, setLayout] = useState('grid');

  const filtered = COACHES
    .filter(c => {
      const matchFilter = activeFilter === 'Tümü' || c.specialties.includes(activeFilter);
      const matchSearch = !search || c.name.toLowerCase().includes(search.toLowerCase()) || c.specialties.some(s => s.toLowerCase().includes(search.toLowerCase()));
      const matchCity = city === 'Tüm Şehirler' || c.city === city;
      return matchFilter && matchSearch && matchCity;
    })
    .sort((a, b) => {
      if (sort === 'En Yüksek Puan') return b.rating - a.rating;
      if (sort === 'En Yüksek Başarı') return b.successRate - a.successRate;
      if (sort === 'En Düşük Fiyat') return a.price - b.price;
      if (sort === 'En Yüksek Fiyat') return b.price - a.price;
      if (sort === 'En Fazla Müşteri') return b.clients - a.clients;
      return 0;
    });

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Top header */}
      <div style={{
        padding: '24px 32px 20px', borderBottom: '1px solid rgba(255,255,255,0.06)',
        background: C.sidebarBg,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
          <div>
            <h1 style={{ color: '#fff', fontWeight: 800, fontSize: 24, letterSpacing: -.6 }}>Koç Keşfet</h1>
            <p style={{ color: C.gray500, fontSize: 13, marginTop: 2 }}>{filtered.length} koç bulundu · Hedefine uygun uzmanı bul</p>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {/* Layout toggle */}
            {['grid', 'list'].map(l => (
              <button key={l} onClick={() => setLayout(l)} style={{
                width: 36, height: 36, borderRadius: 8, border: 'none', cursor: 'pointer',
                background: layout === l ? `${C.primary}22` : 'rgba(255,255,255,0.06)',
                color: layout === l ? C.primary : C.gray400, display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                {l === 'grid' ? Icon.grid : Icon.list}
              </button>
            ))}
          </div>
        </div>

        {/* Search + filters row */}
        <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
          {/* Search */}
          <div style={{ position: 'relative', flex: 1, minWidth: 200 }}>
            <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: C.gray400, display: 'flex' }}>{Icon.search}</span>
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Koç adı veya uzmanlık ara..."
              style={{
                width: '100%', padding: '10px 12px 10px 38px', borderRadius: 10,
                background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)',
                color: '#fff', fontSize: 13, outline: 'none',
              }} />
          </div>
          {/* City */}
          <select value={city} onChange={e => setCity(e.target.value)} style={{
            padding: '10px 12px', borderRadius: 10, background: 'rgba(255,255,255,0.06)',
            border: '1px solid rgba(255,255,255,0.1)', color: C.gray300, fontSize: 13, outline: 'none',
          }}>
            {CITIES.map(c => <option key={c} value={c} style={{ background: '#1a2236' }}>{c}</option>)}
          </select>
          {/* Sort */}
          <select value={sort} onChange={e => setSort(e.target.value)} style={{
            padding: '10px 12px', borderRadius: 10, background: 'rgba(255,255,255,0.06)',
            border: '1px solid rgba(255,255,255,0.1)', color: C.gray300, fontSize: 13, outline: 'none',
          }}>
            {SORT_OPTIONS.map(o => <option key={o} value={o} style={{ background: '#1a2236' }}>{o}</option>)}
          </select>
        </div>

        {/* Filter tags */}
        <div style={{ display: 'flex', gap: 8, marginTop: 12, flexWrap: 'wrap' }}>
          {FILTER_TAGS.map(tag => {
            const active = activeFilter === tag;
            return (
              <button key={tag} onClick={() => setActiveFilter(tag)} style={{
                padding: '6px 14px', borderRadius: 20, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 600,
                background: active ? C.primaryGrad : 'rgba(255,255,255,0.07)',
                color: active ? '#fff' : C.gray400,
                boxShadow: active ? `0 4px 12px ${C.primary}33` : 'none',
                transition: 'all .15s',
              }}>{tag}</button>
            );
          })}
        </div>
      </div>

      {/* Cards grid */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '28px 32px' }}>
        <div style={{
          display: layout === 'grid' ? 'grid' : 'flex',
          gridTemplateColumns: layout === 'grid' ? 'repeat(auto-fill, minmax(300px,1fr))' : undefined,
          flexDirection: layout === 'list' ? 'column' : undefined,
          gap: 20,
        }}>
          {filtered.map((coach, i) => (
            <div key={coach.id} style={{ animationDelay: `${i * 0.04}s` }}>
              <CoachCard coach={coach} onView={onViewCoach} layout={layout} />
            </div>
          ))}
          {filtered.length === 0 && (
            <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '60px 20px', color: C.gray500 }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>🔍</div>
              <div style={{ fontSize: 16, fontWeight: 600, color: C.gray400 }}>Sonuç bulunamadı</div>
              <div style={{ fontSize: 13, marginTop: 4 }}>Arama terimini veya filtreleri değiştirin</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Before/After Carousel ──────────────────────────────────
function TransformCarousel({ items, accent }) {
  const [idx, setIdx] = useState(0);
  const prev = () => setIdx(i => (i - 1 + items.length) % items.length);
  const next = () => setIdx(i => (i + 1) % items.length);
  const item = items[idx];

  return (
    <div style={{ position: 'relative' }}>
      <div style={{ display: 'flex', gap: 16, alignItems: 'stretch' }}>
        {/* Before */}
        <div style={{ flex: 1, borderRadius: 16, overflow: 'hidden', position: 'relative' }}>
          <div style={{
            height: 260, background: `repeating-linear-gradient(45deg, #1a2236, #1a2236 10px, #1e2840 10px, #1e2840 20px)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ color: C.gray600, fontSize: 11, fontWeight: 500, marginBottom: 6 }}>FOTOĞRAF YERİ</div>
              <div style={{ color: C.gray700, fontSize: 10 }}>before · {item.name}</div>
            </div>
          </div>
          <div style={{
            position: 'absolute', top: 12, left: 12, background: 'rgba(0,0,0,0.6)',
            color: '#fff', padding: '4px 10px', borderRadius: 6, fontSize: 11, fontWeight: 600,
          }}>ÖNCE</div>
          <div style={{
            position: 'absolute', bottom: 12, left: 12, right: 12,
            background: 'rgba(0,0,0,0.7)', color: '#fff',
            padding: '6px 12px', borderRadius: 8, fontSize: 11, fontWeight: 500,
          }}>{item.before}</div>
        </div>

        {/* After */}
        <div style={{ flex: 1, borderRadius: 16, overflow: 'hidden', position: 'relative' }}>
          <div style={{
            height: 260, background: `repeating-linear-gradient(135deg, #0f2017, #0f2017 10px, #132618 10px, #132618 20px)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ color: C.gray600, fontSize: 11, fontWeight: 500, marginBottom: 6 }}>FOTOĞRAF YERİ</div>
              <div style={{ color: C.gray700, fontSize: 10 }}>after · {item.name}</div>
            </div>
          </div>
          <div style={{
            position: 'absolute', top: 12, left: 12,
            background: `linear-gradient(135deg,${accent},${accent}cc)`,
            color: '#fff', padding: '4px 10px', borderRadius: 6, fontSize: 11, fontWeight: 600,
          }}>SONRA</div>
          <div style={{
            position: 'absolute', bottom: 12, left: 12, right: 12,
            background: 'rgba(0,0,0,0.7)', color: '#fff',
            padding: '6px 12px', borderRadius: 8, fontSize: 11, fontWeight: 500,
          }}>{item.after}</div>
          {/* Stat pill */}
          <div style={{
            position: 'absolute', top: 12, right: 12,
            background: `${accent}EE`, color: '#fff',
            padding: '5px 12px', borderRadius: 20, fontSize: 13, fontWeight: 800,
          }}>{item.stat}</div>
        </div>
      </div>

      {/* Caption */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 14 }}>
        <div style={{ color: C.gray500, fontSize: 12 }}>
          <span style={{ fontWeight: 600, color: C.gray700 }}>{item.name}</span> · {item.duration}
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <button onClick={prev} style={{
            width: 32, height: 32, borderRadius: '50%', border: `1.5px solid ${accent}44`,
            background: `${accent}14`, color: accent, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>{Icon.chevronLeft}</button>
          <span style={{ color: C.gray400, fontSize: 12 }}>{idx + 1}/{items.length}</span>
          <button onClick={next} style={{
            width: 32, height: 32, borderRadius: '50%', border: `1.5px solid ${accent}44`,
            background: `${accent}14`, color: accent, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>{Icon.chevronRight}</button>
        </div>
      </div>
    </div>
  );
}

            <div style={{ background: '#fff', borderRadius: 20, overflow: 'hidden', boxShadow: C.cardShadow, border: '1px solid rgba(0,0,0,0.055)' }}>
              <div style={{ padding: '18px 24px', borderBottom: '1px solid rgba(0,0,0,0.06)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <h3 style={{ fontWeight: 700, fontSize: 15, color: C.gray900 }}>Aktif Öğrenciler ({activeStudents.length})</h3>
              </div>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ background: C.gray50 }}>
                    {['Öğrenci', 'Hedef', 'Paket', 'Antrenman', 'Tamamlama', 'Son Kilo', 'İşlem'].map(h => (
                      <th key={h} style={{ padding: '11px 18px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: C.gray400, letterSpacing: .3, textTransform: 'uppercase', whiteSpace: 'nowrap' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {activeStudents.map((s, i) => {
                    const compColor = s.completion >= 80 ? C.success : s.completion >= 60 ? C.warning : C.danger;
                    return (
                      <tr key={s.id} style={{ borderTop: '1px solid rgba(0,0,0,0.05)', background: i % 2 === 0 ? '#fff' : C.gray50 }}>
                        <td style={{ padding: '14px 18px' }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            <div style={{
                              width: 32, height: 32, borderRadius: '50%',
                              background: `linear-gradient(135deg,${accent},${accent}88)`,
                              display: 'flex', alignItems: 'center', justifyContent: 'center',
                              color: '#fff', fontWeight: 700, fontSize: 12,
                            }}>
                              {s.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div>
                              <div style={{ fontWeight: 600, fontSize: 13, color: C.gray800 }}>{s.name}</div>
                              <div style={{ fontSize: 10, color: C.gray400 }}>{s.since}'den beri</div>
                            </div>
                          </div>
                        </td>
                        <td style={{ padding: '14px 18px' }}>
                          <span style={{ background: `${accent}14`, color: accent, borderRadius: 20, padding: '3px 9px', fontSize: 11, fontWeight: 600 }}>{s.goal}</span>
                        </td>
                        <td style={{ padding: '14px 18px', color: C.gray600, fontSize: 13 }}>{s.pkg}</td>
                        <td style={{ padding: '14px 18px', color: C.gray600, fontSize: 13 }}>
                          <span style={{ fontWeight: 700, color: C.gray900 }}>{s.workouts}</span> antrenman
                        </td>
                        <td style={{ padding: '14px 18px' }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                            <div style={{ flex: 1, maxWidth: 80, height: 6, borderRadius: 3, background: C.gray100, overflow: 'hidden' }}>
                              <div style={{ width: `${s.completion}%`, height: '100%', background: compColor, borderRadius: 3 }} />
                            </div>
                            <span style={{ fontSize: 12, fontWeight: 700, color: compColor }}>%{s.completion}</span>
                          </div>
                        </td>
                        <td style={{ padding: '14px 18px' }}>
                          <span style={{ fontWeight: 700, fontSize: 13, color: s.lastChange.startsWith('+') ? C.success : s.lastChange.startsWith('-') ? C.danger : C.gray400 }}>
                            {s.lastChange}
                          </span>
                          <div style={{ fontSize: 10, color: C.gray400 }}>{s.lastDate}</div>
                        </td>
                        <td style={{ padding: '14px 18px' }}>
                          <div style={{ display: 'flex', gap: 6 }}>
                            <button style={{ background: `${C.tertiary}14`, color: C.tertiary, border: 'none', borderRadius: 6, padding: '5px 10px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>Mesaj</button>
                            <button style={{ background: C.gray100, color: C.gray600, border: 'none', borderRadius: 6, padding: '5px 10px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>Profil</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('marketplace');
  const [selectedCoach, setSelectedCoach] = useState(null);

  const handleViewCoach = (coach) => {
    setSelectedCoach(coach);
    setView('landing');
  };

  const handleBack = () => {
    setSelectedCoach(null);
    setView('marketplace');
  };

  // Tweaks
  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  return (
    <div style={{ display: 'flex', width: '100vw', height: '100vh', overflow: 'hidden', background: '#0B0F1A' }}>
      <Sidebar view={view} setView={(v) => { setView(v); if (v !== 'landing') setSelectedCoach(null); }} />

      {view === 'marketplace' && (
        <MarketplacePage onViewCoach={handleViewCoach} />
      )}
      {view === 'landing' && (
        <CoachLandingPage coach={selectedCoach || COACHES[0]} onBack={handleBack} />
      )}
      {view === 'admin' && (
        <AdminPanel />
      )}

      {/* Tweaks panel */}
      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 80, right: 20, background: '#fff', borderRadius: 16,
          boxShadow: '0 8px 32px rgba(0,0,0,0.15)', border: '1px solid rgba(0,0,0,0.08)',
          padding: 20, width: 260, zIndex: 2000, animation: 'fadeUp .2s ease',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <span style={{ fontWeight: 700, fontSize: 14, color: C.gray900 }}>Tweaks</span>
            <button onClick={() => {
              setTweaksOpen(false);
              window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
            }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.gray400 }}>✕</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, marginBottom: 6, textTransform: 'uppercase', letterSpacing: .5 }}>Görünüm</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {['Keşfet', 'Profil', 'Panel'].map((label, i) => {
                  const views = ['marketplace', 'landing', 'admin'];
                  return (
                    <button key={label} onClick={() => { setView(views[i]); if (views[i] !== 'landing') setSelectedCoach(null); }} style={{
                      flex: 1, padding: '7px 4px', borderRadius: 8, border: `1.5px solid ${view === views[i] ? C.primary : C.gray200}`,
                      background: view === views[i] ? `${C.primary}12` : 'transparent',
                      color: view === views[i] ? C.primary : C.gray500, fontSize: 11, fontWeight: 600, cursor: 'pointer',
                    }}>{label}</button>
                  );
                })}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.gray400, marginBottom: 6, textTransform: 'uppercase', letterSpacing: .5 }}>Koç Profili Örnek</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {COACHES.map(c => (
                  <button key={c.id} onClick={() => { setSelectedCoach(c); setView('landing'); }} style={{
                    display: 'flex', alignItems: 'center', gap: 8, padding: '7px 10px',
                    borderRadius: 8, border: `1.5px solid ${selectedCoach?.id === c.id && view === 'landing' ? c.accentColor : C.gray200}`,
                    background: selectedCoach?.id === c.id && view === 'landing' ? `${c.accentColor}0E` : 'transparent',
                    cursor: 'pointer', textAlign: 'left',
                  }}>
                    <div style={{ width: 20, height: 20, borderRadius: '50%', background: c.accentColor, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 8, fontWeight: 800 }}>
                      {c.name.split(' ').map(n => n[0]).join('')}
                    </div>
                    <span style={{ fontSize: 12, color: C.gray700, fontWeight: 500 }}>{c.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
