<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Lexend',sans-serif;background:#0B0F1A;min-height:100vh;display:flex;align-items:stretch;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px;}
  input,textarea,select{font-family:'Lexend',sans-serif;}
  button{font-family:'Lexend',sans-serif;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="app" style="display:flex;width:100%;min-height:100vh;"></div>

<script type="text/babel">

    {id:5,name:'Zeynep Şahin',email:'zeynep@example.com',status:'PENDING',compliance:0,lastWorkout:null,workouts:0,goal:'Kilo Verme'},

    {id:3,name:'Lower Body',date:'21 Nis 2026',status:'ABANDONED',sets:8,comments:0,duration:25},

  ],

    {id:2,client:'Fatma Demir',action:'tamamladı',template:'Upper Body Push',time:'4 sa önce',status:'ok'},
    {id:3,client:'Ahmet Yılmaz',action:'yarıda bıraktı',template:'Lower Body',time:'1 gün önce',status:'warn'},
    {id:4,client:'Selin Arslan',action:'tamamladı',template:'Cardio & Core',time:'2 gün önce',status:'ok'},

// ── Primitive Components ──────────────────────────────────
function Avatar({name,size=36,color=C.primary}){
  const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  return <div style={{width:size,height:size,borderRadius:'50%',background:`linear-gradient(135deg,${color},${color}cc)`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:size*.36,flexShrink:0,boxShadow:`0 2px 8px ${color}44`}}>{initials}</div>;
}

function Badge({children,color=C.primary,small}){
  return <span style={{background:color+'18',color,borderRadius:20,padding:small?'2px 8px':'4px 10px',fontSize:small?10:11,fontWeight:700,whiteSpace:'nowrap',display:'inline-block'}}>{children}</span>;
}

function Btn({children,variant='primary',onClick,full,small,icon,disabled}){
  const s={
    primary:{background:C.primaryGrad,color:'#fff',border:'none',boxShadow:`0 4px 14px ${C.primary}44`},
    secondary:{background:`linear-gradient(135deg,${C.secondary},${C.secondaryLight})`,color:'#fff',border:'none',boxShadow:`0 4px 14px ${C.secondary}33`},
    outlined:{background:'transparent',color:C.primary,border:`1.5px solid ${C.primary}`},
    ghost:{background:C.gray100,color:C.gray600,border:'none'},
    danger:{background:`linear-gradient(135deg,${C.danger},#dc2626)`,color:'#fff',border:'none'},
    success:{background:`linear-gradient(135deg,${C.success},#16a34a)`,color:'#fff',border:'none'},
  };
  return <button onClick={onClick} disabled={disabled} style={{...s[variant],borderRadius:10,padding:small?'8px 14px':'11px 20px',fontSize:small?12:14,fontWeight:700,cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1,width:full?'100%':'auto',display:'flex',alignItems:'center',gap:6,justifyContent:'center',transition:'opacity .15s',letterSpacing:-.1}}>{icon&&<span style={{display:'flex'}}>{icon}</span>}{children}</button>;
}

function Card({children,style,onClick,padding=20}){
  return <div onClick={onClick} style={{background:'#fff',borderRadius:16,padding,boxShadow:C.cardShadow,border:'1px solid rgba(0,0,0,0.055)',cursor:onClick?'pointer':'default',...style}}>{children}</div>;
}

// ── Icons ─────────────────────────────────────────────────
const Ic={
  home:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>,
  templates:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  clients:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
  messages:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
  profile:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  calendar:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  coaches:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
  dumbbell:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6.5 6.5h11M6.5 17.5h11M3 10h18M3 14h18"/></svg>,

  x:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  plus:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  search:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  arrow:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9,18 15,12 9,6"/></svg>,
  send:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>,
  star:<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>,
  edit:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  trash:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>,
};

// ── Sidebar ───────────────────────────────────────────────
function Sidebar({screen,role,onNav,onRoleSwitch}){
  const coachNav=[
    {key:'coach-dashboard',label:'Ana Sayfa',icon:Ic.home},
    {key:'coach-templates',label:'Templates',icon:Ic.templates},
    {key:'coach-clients',label:'Danışanlar',icon:Ic.clients},
    {key:'coach-messages',label:'Mesajlar',icon:Ic.messages},
    {key:'coach-profile',label:'Profil',icon:Ic.profile},
    {key:'coach-billing',label:'Faturalama',icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>},
  ];
  const clientNav=[
    {key:'client-dashboard',label:'Ana Sayfa',icon:Ic.home},
    {key:'client-calendar',label:'Takvim',icon:Ic.calendar},
    {key:'client-coaches',label:'Koçlarım',icon:Ic.coaches},
    {key:'client-workouts',label:'Antrenmanlar',icon:Ic.dumbbell},
    {key:'client-messages',label:'Mesajlar',icon:Ic.messages},
    {key:'client-profile',label:'Profil',icon:Ic.profile},
  ];
  const nav=role==='coach'?coachNav:clientNav;

  return(
    <div style={{width:240,background:C.sidebarBg,display:'flex',flexDirection:'column',height:'100vh',position:'sticky',top:0,flexShrink:0}}>
      {/* Logo */}
      <div style={{padding:'28px 20px 24px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <img src="logo.png" alt="FitCoach" style={{width:40,height:40,objectFit:'contain',filter:'drop-shadow(0 3px 10px rgba(249,115,22,0.5))'}}/>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:'#fff',letterSpacing:-.5}}>FitCoach OS</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.35)',textTransform:'uppercase',letterSpacing:1,marginTop:1}}>Performance Platform</div>
          </div>
        </div>
      </div>

      {/* Role switcher */}
      <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
        <div style={{background:'rgba(255,255,255,0.06)',borderRadius:10,padding:4,display:'flex',gap:4}}>
          {['client','coach'].map(r=>(
            <button key={r} onClick={()=>onRoleSwitch(r)} style={{flex:1,background:role===r?'rgba(255,255,255,0.12)':'transparent',border:'none',borderRadius:8,padding:'7px 0',fontSize:12,fontWeight:700,cursor:'pointer',color:role===r?'#fff':'rgba(255,255,255,0.35)',transition:'all .15s'}}>
              {r==='client'?'Danışan':'Koç'}
            </button>
          ))}
        </div>
      </div>

      {/* Nav */}
      <nav style={{flex:1,padding:'12px 12px',display:'flex',flexDirection:'column',gap:2,overflowY:'auto'}}>
        {nav.map(item=>{
          const active=screen===item.key||screen.startsWith(item.key);
          return(
            <button key={item.key} onClick={()=>onNav(item.key)}
              style={{display:'flex',alignItems:'center',gap:12,padding:'11px 12px',borderRadius:12,border:'none',cursor:'pointer',background:active?'rgba(249,115,22,0.15)':'transparent',color:active?C.primary:'rgba(255,255,255,0.5)',transition:'all .15s',textAlign:'left',width:'100%',fontFamily:'Lexend,sans-serif'}}>
              <span style={{display:'flex',opacity:active?1:.7}}>{item.icon}</span>
              <span style={{fontSize:14,fontWeight:active?700:500}}>{item.label}</span>
              {active&&<div style={{width:3,height:18,background:C.primary,borderRadius:2,marginLeft:'auto'}}/>}
            </button>
          );
        })}
      </nav>

      {/* User card */}
      <div style={{padding:'16px',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <Avatar name={role==='coach'?'Berk Öztürk':'Selin Arslan'} size={36} color={role==='coach'?C.secondary:C.primary}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{role==='coach'?'Berk Öztürk':'Selin Arslan'}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.35)'}}>{role==='coach'?'Koç':'Danışan'}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Topbar ────────────────────────────────────────────────
function Topbar({title,subtitle,right,onBack}){
  return(
    <div style={{display:'flex',alignItems:'center',padding:'20px 32px',background:'#fff',borderBottom:'1px solid #F1F5F9',flexShrink:0,gap:14}}>
      {onBack&&<button onClick={onBack} style={{background:C.gray100,border:'none',borderRadius:10,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:C.gray800}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15,18 9,12 15,6"/></svg></button>}
      <div style={{flex:1}}>
        <h1 style={{fontSize:22,fontWeight:800,color:C.gray800,letterSpacing:-.5,margin:0}}>{title}</h1>
        {subtitle&&<p style={{fontSize:13,color:C.gray400,margin:'2px 0 0'}}>{subtitle}</p>}
      </div>
      {right}
    </div>
  );
}

// ── COACH SCREENS ─────────────────────────────────────────
function CoachDashboard({onNav}){
  const accepted=mockData.clients.filter(c=>c.status==='ACCEPTED');
  const pending=mockData.clients.filter(c=>c.status==='PENDING');
  const weeks=[65,72,80,75,88,85,82];

  return(
    <div style={{flex:1,overflowY:'auto',background:C.neutral,animation:'fadeUp .2s ease'}}>
      {/* Hero banner */}
      <div style={{background:`linear-gradient(135deg,${C.secondary} 0%,${C.secondaryLight} 60%,${C.tertiary} 100%)`,padding:'32px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-60,right:-60,width:280,height:280,borderRadius:'50%',background:'rgba(255,255,255,0.05)'}}/>
        <div style={{position:'absolute',bottom:-80,left:120,width:220,height:220,borderRadius:'50%',background:'rgba(249,115,22,0.1)'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',position:'relative',zIndex:1}}>
          <div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.55)',fontWeight:700,textTransform:'uppercase',letterSpacing:1.5,marginBottom:6}}>Pazartesi, 27 Nisan 2026</div>
            <h2 style={{fontSize:28,fontWeight:800,color:'#fff',margin:'0 0 6px',letterSpacing:-.8}}>Hassasiyetin Sınırlarını Zorla</h2>
            <p style={{color:'rgba(255,255,255,0.6)',fontSize:14,margin:0,maxWidth:480}}>Günlük komuta görünümü — uyumluluk izle, yük durumunu takip et, öncelikli danışanlara hızlı aksiyon al.</p>
          </div>
          <div style={{display:'flex',gap:10}}>
            <div style={{background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:12,padding:'8px 14px',display:'flex',alignItems:'center',gap:8,cursor:'pointer',backdropFilter:'blur(10px)'}}>
              {Ic.bell}<span style={{color:'#fff',fontSize:13,fontWeight:600}}>3</span>
            </div>
          </div>
        </div>
        {/* Metric pills */}
        <div style={{display:'flex',gap:12,marginTop:24,position:'relative',zIndex:1}}>
          {[
            {label:'Aktif Danışan',val:accepted.length,sub:'+1 bu ay',color:'rgba(255,255,255,0.95)'},
            {label:'Günlük Uyumluluk',val:'82%',sub:'Optimum aralık',color:'#FED7AA'},
            {label:'Bugünkü Antrenman',val:'3',sub:'1 bekliyor',color:'rgba(255,255,255,0.95)'},
          ].map(m=>(
            <div key={m.label} style={{background:'rgba(255,255,255,0.1)',borderRadius:14,padding:'16px 20px',backdropFilter:'blur(10px)',border:'1px solid rgba(255,255,255,0.12)',minWidth:160}}>
              <div style={{fontSize:28,fontWeight:800,color:m.color,letterSpacing:-1}}>{m.val}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,0.55)',marginTop:4}}>{m.label}</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',marginTop:2}}>{m.sub}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:24,padding:24}}>
        {/* Left column */}
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          {/* Compliance chart */}
          <Card>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div>
                <h3 style={{fontSize:16,fontWeight:800,color:C.gray800,margin:0,letterSpacing:-.3}}>Haftalık Uyumluluk</h3>
                <p style={{fontSize:12,color:C.gray400,margin:'3px 0 0'}}>Son 7 hafta · Ortalama %78</p>
              </div>
              <Badge color={C.success}>↑ %4 artış</Badge>
            </div>

// ── 360° CLIENT HUB ──────────────────────────────────────
// Pure SVG chart helpers — no external deps

function SVGLineChart({ data, lines, width = 600, height = 240 }) {
  const pad = { top: 16, right: 16, bottom: 28, left: 40 };
  const W = width - pad.left - pad.right;
  const H = height - pad.top - pad.bottom;

  const allVals = lines.flatMap(l => data.map(d => d[l.key]));
  const minV = Math.min(...allVals) * 0.96;
  const maxV = Math.max(...allVals) * 1.02;

  const xScale = i => (i / (data.length - 1)) * W;
  const yScale = v => H - ((v - minV) / (maxV - minV)) * H;

  const [hover, setHover] = React.useState(null);

  function buildPath(key) {
    return data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i).toFixed(1)},${yScale(d[key]).toFixed(1)}`).join(' ');
  }

  function buildArea(key) {
    const pts = data.map((d, i) => `${xScale(i).toFixed(1)},${yScale(d[key]).toFixed(1)}`).join(' L ');
    return `M ${pts} L ${xScale(data.length - 1)},${H} L 0,${H} Z`;
  }

  // Y axis ticks
  const yTicks = Array.from({ length: 5 }, (_, i) => minV + ((maxV - minV) * i) / 4);

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ overflow: 'visible', display: 'block' }}>
        <defs>
          {lines.map(l => (
            <linearGradient key={l.key} id={`grad-${l.key}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={l.color} stopOpacity="0.18"/>
              <stop offset="100%" stopColor={l.color} stopOpacity="0"/>
            </linearGradient>
          ))}
        </defs>
        <g transform={`translate(${pad.left},${pad.top})`}>
          {/* Grid */}
          {yTicks.map((v, i) => (
            <g key={i}>
              <line x1="0" y1={yScale(v)} x2={W} y2={yScale(v)} stroke={C.gray100} strokeWidth="1"/>
              <text x="-8" y={yScale(v) + 4} textAnchor="end" fontSize="10" fill={C.gray400} fontFamily="Lexend">{Math.round(v)}</text>
            </g>
          ))}
          {/* X labels */}
          {data.map((d, i) => (
            <text key={i} x={xScale(i)} y={H + 18} textAnchor="middle" fontSize="10" fill={C.gray400} fontFamily="Lexend">{d.week}</text>
          ))}
          {/* Area fills */}
          {lines.map(l => (
            <path key={`area-${l.key}`} d={buildArea(l.key)} fill={`url(#grad-${l.key})`}/>
          ))}
          {/* Lines */}
          {lines.map(l => (
            <path key={`line-${l.key}`} d={buildPath(l.key)} fill="none" stroke={l.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          ))}
          {/* Hover dots */}
          {hover !== null && lines.map(l => (
            <circle key={`dot-${l.key}`} cx={xScale(hover)} cy={yScale(data[hover][l.key])} r="5" fill={l.color} stroke="#fff" strokeWidth="2" style={{ filter: `drop-shadow(0 0 4px ${l.color})` }}/>
          ))}
          {/* Hover tooltip */}
          {hover !== null && (
            <g>
              <line x1={xScale(hover)} y1="0" x2={xScale(hover)} y2={H} stroke="rgba(0,0,0,0.08)" strokeWidth="1" strokeDasharray="4"/>
              <rect x={Math.min(xScale(hover) + 8, W - 100)} y="0" width="100" height={lines.length * 22 + 22} rx="8" fill="#0D1B2E" opacity="0.95"/>
              <text x={Math.min(xScale(hover) + 16, W - 92)} y="16" fontSize="10" fill="rgba(255,255,255,0.5)" fontFamily="Lexend" fontWeight="700">{data[hover].week}</text>
              {lines.map((l, li) => (
                <g key={li}>
                  <circle cx={Math.min(xScale(hover) + 16, W - 92) + 4} cy={32 + li * 22} r="4" fill={l.color}/>
                  <text x={Math.min(xScale(hover) + 16, W - 92) + 14} y={36 + li * 22} fontSize="11" fill="#fff" fontFamily="Lexend" fontWeight="700">{data[hover][l.key]} kg</text>
                </g>
              ))}
            </g>
          )}
          {/* Invisible interaction layer */}
          {data.map((d, i) => (
            <rect key={i} x={xScale(i) - W / (data.length * 2)} y="0" width={W / data.length} height={H} fill="transparent"
              onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: 'crosshair' }}/>
          ))}
        </g>
      </svg>
    </div>
  );
}

function SVGBarChart({ data, bars, width = 500, height = 180 }) {
  const pad = { top: 12, right: 12, bottom: 28, left: 44 };
  const W = width - pad.left - pad.right;
  const H = height - pad.top - pad.bottom;
  const allVals = bars.flatMap(b => data.map(d => d[b.key]));
  const maxV = Math.max(...allVals) * 1.1 || 1;
  const yScale = v => H - (v / maxV) * H;
  const groupW = W / data.length;
  const barW = (groupW * 0.7) / bars.length;
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(t => t * maxV);
  const [hover, setHover] = React.useState(null);

  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      <g transform={`translate(${pad.left},${pad.top})`}>
        {yTicks.map((v, i) => (
          <g key={i}>
            <line x1="0" y1={yScale(v)} x2={W} y2={yScale(v)} stroke={C.gray100} strokeWidth="1"/>
            <text x="-6" y={yScale(v) + 4} textAnchor="end" fontSize="10" fill={C.gray400} fontFamily="Lexend">{Math.round(v / 1000)}k</text>
          </g>
        ))}
        {data.map((d, gi) => (
          <g key={gi}>
            {bars.map((b, bi) => {
              const x = gi * groupW + (groupW * 0.15) + bi * (barW + 2);
              const bh = Math.max(0, H - yScale(d[b.key]));
              const isHov = hover === `${gi}-${bi}`;
              return (
                <g key={bi}>
                  <rect x={x} y={yScale(d[b.key])} width={barW} height={bh} rx="4" fill={isHov ? b.color : b.color + (bi === 0 ? 'ff' : '66')}
                    onMouseEnter={() => setHover(`${gi}-${bi}`)} onMouseLeave={() => setHover(null)} style={{ cursor: 'default', transition: 'fill .15s' }}/>
                  {isHov && <rect x={x - 4} y={yScale(d[b.key]) - 24} width={barW + 8} height={22} rx="6" fill="#0D1B2E" opacity="0.95"/>}
                  {isHov && <text x={x + barW / 2} y={yScale(d[b.key]) - 8} textAnchor="middle" fontSize="11" fill="#fff" fontFamily="Lexend" fontWeight="700">{(d[b.key] / 1000).toFixed(1)}k</text>}
                </g>
              );
            })}
            <text x={gi * groupW + groupW / 2} y={H + 18} textAnchor="middle" fontSize="10" fill={C.gray400} fontFamily="Lexend">{d.day}</text>
          </g>
        ))}
      </g>
    </svg>
  );
}

                  <button disabled style={{ width: '100%', padding: '11px', borderRadius: 12, border: `1.5px solid ${C.gray200}`, background: 'transparent', color: C.gray300, fontSize: 13, fontWeight: 700, cursor: 'not-allowed', fontFamily: 'Lexend, sans-serif' }}>Düşür</button>
                )}
                {isCurrent && (
                  <button disabled style={{ width: '100%', padding: '11px', borderRadius: 12, border: `1.5px solid ${C.success}40`, background: C.success + '12', color: C.success, fontSize: 13, fontWeight: 700, cursor: 'not-allowed', fontFamily: 'Lexend, sans-serif' }}>✓ Mevcut Plan</button>
                )}
                {tier.status === 'upgrade' && !isCurrent && (
                  <button onClick={handleUpgrade} disabled={upgrading}
                    style={{ width: '100%', padding: '12px', borderRadius: 12, border: 'none', background: upgrading ? C.gray400 : C.primaryGrad, color: '#fff', fontSize: 14, fontWeight: 700, cursor: upgrading ? 'not-allowed' : 'pointer', fontFamily: 'Lexend, sans-serif', boxShadow: upgrading ? 'none' : `0 4px 16px ${C.primary}55`, transition: 'all .2s' }}>
                    {upgrading ? '⏳ İşleniyor...' : 'Elite\'e Yükselt →'}
                  </button>
                )}
              </div>
            );
          })}
        </div>

        {/* ── Billing History ── */}
        <div style={{ background: '#fff', borderRadius: 20, overflow: 'hidden', boxShadow: C.cardShadow, border: `1px solid ${C.gray100}` }}>
          <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.gray100}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 16, fontWeight: 800, color: C.gray800, letterSpacing: -.3 }}>Faturalama Geçmişi</div>
              <div style={{ fontSize: 12, color: C.gray400, marginTop: 2 }}>Tüm fatura ve ödemeler</div>
            </div>
            <button style={{ background: C.gray50, border: `1px solid ${C.gray200}`, borderRadius: 10, padding: '8px 16px', fontSize: 12, fontWeight: 700, color: C.gray600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, fontFamily: 'Lexend, sans-serif' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Tümünü İndir
            </button>
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ background: C.gray50 }}>
                {['Fatura No', 'Tarih', 'Açıklama', 'Tutar', 'Durum', ''].map(h => (
                  <th key={h} style={{ padding: '11px 20px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: C.gray400, textTransform: 'uppercase', letterSpacing: .5 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {invoices.map((inv, i) => (
                <tr key={inv.id} style={{ borderTop: `1px solid ${C.gray100}`, transition: 'background .1s' }}
                  onMouseEnter={e => e.currentTarget.style.background = C.gray50}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <td style={{ padding: '14px 20px', fontSize: 12, fontWeight: 700, color: C.gray400, fontFamily: 'monospace' }}>{inv.id}</td>
                  <td style={{ padding: '14px 20px', fontSize: 13, color: C.gray600 }}>{inv.date}</td>
                  <td style={{ padding: '14px 20px', fontSize: 13, fontWeight: 600, color: C.gray800 }}>{inv.desc}</td>
                  <td style={{ padding: '14px 20px', fontSize: 14, fontWeight: 800, color: C.gray800 }}>{inv.amount}</td>
                  <td style={{ padding: '14px 20px' }}>
                    <span style={{ background: C.success + '15', color: C.success, borderRadius: 20, padding: '4px 12px', fontSize: 11, fontWeight: 700 }}>✓ {inv.status}</span>
                  </td>
                  <td style={{ padding: '14px 20px' }}>
                    <button style={{ background: 'transparent', border: `1px solid ${C.gray200}`, borderRadius: 8, padding: '6px 12px', fontSize: 12, fontWeight: 600, color: C.gray500, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 5, fontFamily: 'Lexend, sans-serif', transition: 'all .15s' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = C.primary; e.currentTarget.style.color = C.primary; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = C.gray200; e.currentTarget.style.color = C.gray500; }}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                      PDF
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* ── Payment Method ── */}
        <div style={{ background: '#fff', borderRadius: 20, padding: 24, boxShadow: C.cardShadow, border: `1px solid ${C.gray100}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <div style={{ width: 52, height: 36, background: `linear-gradient(135deg, #1a1a2e, #16213e)`, borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 8px rgba(0,0,0,0.15)' }}>
              <svg width="28" height="18" viewBox="0 0 48 32" fill="none">
                <circle cx="18" cy="16" r="11" fill="#EB001B" opacity=".9"/>
                <circle cx="30" cy="16" r="11" fill="#F79E1B" opacity=".9"/>
                <path d="M24 7.5a11 11 0 010 17" fill="#FF5F00" opacity=".7"/>
              </svg>
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.gray800 }}>Mastercard •••• 4242</div>
              <div style={{ fontSize: 12, color: C.gray400, marginTop: 2 }}>Son kullanma: 12/2028</div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button style={{ background: C.gray50, border: `1px solid ${C.gray200}`, borderRadius: 10, padding: '8px 16px', fontSize: 13, fontWeight: 700, color: C.gray600, cursor: 'pointer', fontFamily: 'Lexend, sans-serif' }}>Değiştir</button>
            <button style={{ background: C.primaryGrad, border: 'none', borderRadius: 10, padding: '8px 16px', fontSize: 13, fontWeight: 700, color: '#fff', cursor: 'pointer', fontFamily: 'Lexend, sans-serif', boxShadow: `0 4px 12px ${C.primary}44` }}>Yeni Kart Ekle</button>
          </div>
        </div>

      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────
function App(){
  const [role,setRole]=React.useState('coach');
  const [screen,setScreen]=React.useState('coach-dashboard');

  function switchRole(r){
    setRole(r);
    setScreen(r==='coach'?'coach-dashboard':'client-dashboard');
  }

  function getActiveNavKey(){
    if(screen.startsWith('coach-')){
      if(screen.includes('template')) return 'coach-templates';
      if(screen.includes('client')) return 'coach-clients';
      if(screen.includes('message')) return 'coach-messages';
    if(screen.includes('billing')) return 'coach-billing';
      if(screen.includes('profile')) return 'coach-profile';
      return 'coach-dashboard';
    } else {
      if(screen.includes('calendar')) return 'client-calendar';
      if(screen.includes('coaches')||screen.includes('marketplace')) return 'client-coaches';
      if(screen.includes('workout')) return 'client-workouts';
      if(screen.includes('message')) return 'client-messages';
      if(screen.includes('profile')) return 'client-profile';
      return 'client-dashboard';
    }
  }

  function renderScreen(){
    const p={onNav:setScreen};
    switch(screen){
      case 'coach-dashboard': return <CoachDashboard {...p}/>;
      case 'coach-templates': return <CoachTemplates {...p}/>;
      case 'coach-clients': return <CoachClients {...p}/>;
      case 'coach-client-progress': return <ClientHub {...p}/>;
      case 'coach-messages': return <CoachMessages {...p}/>;
      case 'coach-profile': return <CoachDashboard {...p}/>;
      case 'coach-billing': return <BillingPage {...p}/>;
      case 'client-dashboard': return <ClientDashboard {...p}/>;
      case 'client-coaches': return <ClientCoachesDesktop {...p}/>;
      case 'client-messages': return <CoachMessages {...p}/>;
      case 'client-workouts': return <ClientDashboard {...p}/>;
      case 'client-calendar': return <ClientDashboard {...p}/>;
      case 'client-profile': return <ClientDashboard {...p}/>;
      default: return <CoachDashboard {...p}/>;
    }
  }

  return(
    <div style={{display:'flex',width:'100%',minHeight:'100vh',fontFamily:'Lexend,sans-serif'}}>
      <Sidebar screen={getActiveNavKey()} role={role} onNav={setScreen} onRoleSwitch={switchRole}/>
      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {renderScreen()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
