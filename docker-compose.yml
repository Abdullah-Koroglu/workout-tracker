services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=fitcoach
      - POSTGRES_USER=fitcoach
      - POSTGRES_PASSWORD=fitcoach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitcoach -d fitcoach"]
      interval: 5s
      timeout: 5s
      retries: 20

  nextjs_app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public:/app/public
    environment:
      - DATABASE_URL=postgresql://fitcoach:fitcoach@postgres:5432/fitcoach?schema=public
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_SECRET=${NEXTAUTH_SECRET}
      - PORT=3000
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  ws_server:
    build: .
    command: ["sh", "-c", "npx prisma generate --schema=/app/prisma/schema.prisma && npm run start:ws"]
    ports:
      - "3001:3001"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public:/app/public
    environment:
      - DATABASE_URL=postgresql://fitcoach:fitcoach@postgres:5432/fitcoach?schema=public
      - AUTH_SECRET=${NEXTAUTH_SECRET}
      - WS_PORT=3001
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}

  pg_backup:
    image: prodrigestivill/postgres-backup-local
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db_backups:/backups # Yedeklerin atılacağı ve Rclone'un okuyacağı klasör
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fitcoach
      - POSTGRES_USER=fitcoach
      - POSTGRES_PASSWORD=fitcoach
      - SCHEDULE=@daily # Her gece yarısı yedekler
      - BACKUP_KEEP_DAYS=7 # Sunucuda sadece son 7 günü tutar, eskileri siler

volumes:
  postgres_data: